name: Build gallery

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Process images and build manifest
        run: node build-manifest.js

      - name: Commit generated images + manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated assets/designs.json
          if git diff --staged --quiet; then
            echo "Nothing changed."
          else
            git commit -m "Auto-process images and update gallery"
            git push
          fi
